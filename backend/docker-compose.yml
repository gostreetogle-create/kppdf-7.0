# Per docs/backend/ARCHITECTURE.md §5 — MongoDB replica set required for multi-document transactions.
# Per docs/backend/CHECKLIST.md §6.1 row 4.A — Docker Compose up brings MongoDB + Redis online.

# ─── Replica set note ────────────────────────────────────────
# Mongo container MUST boot with --replSet rs0 so the replica set driver hooks
# (transactions, change streams) work. The healthcheck below is self-healing:
# on the first probe it catches `rs.status()` NotYetInitialized and runs
# `rs.initiate(...)` automatically. Subsequent probes pass cleanly.
# Replica member is bound to 127.0.0.1:27017 (NOT the container hostname) so
# the native-host backend (started by start.sh outside Docker) can resolve
# the member via localhost without DNS lookup.
# Removed: backend/docker/mongo-entrypoint.sh mount — became redundant once
# the healthcheck owns initialization.

services:
  mongo:
    image: mongo:7
    container_name: kppdf7-mongo
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: kppdf-7
    volumes:
      - mongo_data:/data/db
    networks:
      - kppdf7-net
    healthcheck:
      test: >
        mongosh --quiet --eval "
        try {
          if (rs.status().ok) quit(0);
        } catch(e) {
          rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: '127.0.0.1:27017' }] });
        }
        quit(1);
        "
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: kppdf7-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - kppdf7-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  redis_data:

networks:
  kppdf7-net:
    driver: bridge
